name: Deploy Identity

trigger: none

pool:
  vmImage: ubuntu-latest

parameters:
- name: Deploy
  type: Boolean
  default: false

steps:
- task: TerraformInstaller@0
  displayName: "Install Terraform"
  inputs:
    terraformVersion: '1.3.9'
    terraformDownloadLocation: 'https://releases.hashicorp.com/terraform'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: cat terraform.global.tfvars terraform.identity.tfvars > terraform.identity.tfvars

- task: AzureCLI@2
  displayName: 'Terraform Init'
  inputs:
    azureSubscription: 'azure-lz-deploy'
    scriptType: 'pscore'
    addSpnToEnvironment: true
    scriptLocation: 'inlineScript'
    workingDirectory: 'src'
    inlineScript: | 
      $env:ARM_CLIENT_ID = $env:servicePrincipalId
      $env:ARM_CLIENT_SECRET =  $env:servicePrincipalKey
      $env:ARM_TENANT_ID = $env:tenantId
      $env:ARM_SUBSCRIPTION_ID = ""
      terraform workspace select identity
      terraform init

- task: AzureCLI@2
  displayName: 'Terraform Validate'
  inputs:
    azureSubscription: 'azure-lz-deploy'
    scriptType: 'pscore'
    addSpnToEnvironment: true
    scriptLocation: 'inlineScript'
    workingDirectory: 'src'
    inlineScript: | 
      $env:ARM_CLIENT_ID = $env:
      $env:ARM_CLIENT_SECRET =  $env:
      $env:ARM_TENANT_ID = $env:
      $env:ARM_SUBSCRIPTION_ID = ""
      terraform workspace select identity
      terraform validate

- task: AzureCLI@2
  displayName: 'Terraform Plan'
  inputs:
    azureSubscription: 'azure-lz-deploy'
    scriptType: 'pscore'
    scriptLocation: 'inlineScript'
    addSpnToEnvironment: true
    workingDirectory: 'src'
    inlineScript: | 
      $env:ARM_CLIENT_ID = $env:
      $env:ARM_CLIENT_SECRET =  $env:
      $env:ARM_TENANT_ID = $env:
      $env:ARM_SUBSCRIPTION_ID = ""
      terraform workspace select identity
      terraform plan -var-file="terraform.identity.tfvars"

- ${{ if eq(parameters['Deploy'], 'true' ) }}:
  - task: AzureCLI@2
    displayName: 'Terraform Apply'
    inputs:
      azureSubscription: 'azure-lz-deploy'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      addSpnToEnvironment: true
      workingDirectory: 'src'
      inlineScript: | 
        $env:ARM_CLIENT_ID = $env:
        $env:ARM_CLIENT_SECRET =  $env:
        $env:ARM_TENANT_ID = $env:
        $env:ARM_SUBSCRIPTION_ID = ""
        terraform workspace select identity
        terraform apply -auto-approve -var-file="terraform.identity.tfvars"