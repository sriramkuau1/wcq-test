name: Deploy Security

trigger: none

pool:
  vmImage: ubuntu-latest

variables:
- group: azure-environment

parameters:
- name: Deploy
  type: boolean
  default: false

steps:
- task: TerraformInstaller@0
  displayName: "Install Terraform"
  inputs:
    terraformVersion: '1.3.9'
    terraformDownloadLocation: 'https://releases.hashicorp.com/terraform'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: cat env/terraform.global.tfvars env/terraform.management.tfvars > temp.tfvars && cat temp.tfvars > terraform.management.tfvars

- task: AzureCLI@2
  displayName: 'Terraform Init'
  inputs:
    azureSubscription: 'azure-lz-deploy'
    scriptType: 'pscore'
    addSpnToEnvironment: true
    scriptLocation: 'inlineScript'
    workingDirectory: 'src'
    inlineScript: |
      $env:ARM_CLIENT_ID = $env:servicePrincipalId
      $env:ARM_CLIENT_SECRET =  $env:servicePrincipalKey
      $env:ARM_TENANT_ID = $env:tenantId
      $env:ARM_SUBSCRIPTION_ID = ""
      terraform workspace select security
      terraform init

- task: AzureCLI@2
  displayName: 'Terraform Validate'
  inputs:
    azureSubscription: 'azure-lz-deploy'
    scriptType: 'pscore'
    addSpnToEnvironment: true
    scriptLocation: 'inlineScript'
    workingDirectory: 'src'
    inlineScript: |
      $env:ARM_CLIENT_ID = $env:servicePrincipalId
      $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
      $env:ARM_TENANT_ID = $env:tenantId
      $env:ARM_SUBSCRIPTION_ID = ""
      terraform workspace select security
      terraform validate

- task: AzureCLI@2
  displayName: 'Terraform Plan'
  inputs:
    azureSubscription: 'sp-terraform-security'
    scriptType: 'pscore'
    scriptLocation: 'inlineScript'
    addSpnToEnvironment: true
    workingDirectory: 'src'
    inlineScript: |
      $env:ARM_CLIENT_ID = $env:servicePrincipalId
      $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
      $env:ARM_TENANT_ID = $env:tenantId
      $env:ARM_SUBSCRIPTION_ID = ""
      terraform workspace select security
      terraform plan -var-file="terraform.security.tfvars"

- ${{ if eq(parameters['Deploy'], 'true' ) }}:
  - task: AzureCLI@2
    displayName: 'Terraform Apply'
    inputs:
      azureSubscription: 'azure-lz-deploy'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      addSpnToEnvironment: true
      workingDirectory: 'src'
      inlineScript: |
        $env:ARM_CLIENT_ID = $env:servicePrincipalId
        $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
        $env:ARM_TENANT_ID = $env:tenantId
        $env:ARM_SUBSCRIPTION_ID = ""
        terraform workspace select security
        terraform apply -auto-approve -var-file="terraform.security.tfvars"
