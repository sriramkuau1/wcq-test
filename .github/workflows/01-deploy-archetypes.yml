name: Deploy Management Groups and Policies

on:
  workflow_dispatch:
    inputs:
      deploy:
        type: boolean
        description: 'Terraform Apply'

jobs:
  tf_fmt:
    name: Deploy Archetypes
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Repo
      uses: actions/checkout@v7
      
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Concat Vars
      run: cat env/terraform.global.tfvars env/terraform.archetypes.tfvars > temp.tfvars && cat temp.tfvars > terraform.archetypes.tfvars

    - name: Terraform init
      id: init
      run: terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}
    
    - name: Terraform validate
      id: validate
      run: terraform validate
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}
    
    - name: Terraform workspace
      id: workspace
      run: terraform workspace select archetypes
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}
 
    - name: Terraform plan
      id: plan
      run: terraform plan -parallelism=5 -var-file="terraform.archetypes.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}
 
    - name: Terraform apply
      if: ${{ inputs.deploy }}
      id: apply
      run: terraform apply -auto-approve -parallelism=5 -var-file="terraform.archetypes.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    # Grant operator MG Reader on wcq and epac-wcq roots so portal/CLI visibility works
    - name: Grant MG Reader to operator
      if: ${{ inputs.deploy && steps.apply.outcome == 'success' }}
      run: |
        az login --service-principal \
          -u "$ARM_CLIENT_ID" \
          -p "$ARM_CLIENT_SECRET" \
          --tenant "$ARM_TENANT_ID" --output none
        for mg_scope in wcq epac-wcq; do
          az role assignment create \
            --assignee-object-id "${{ secrets.OPERATOR_OBJECT_ID }}" \
            --assignee-principal-type User \
            --role "Management Group Reader" \
            --scope "/providers/Microsoft.Management/managementGroups/${mg_scope}" \
            --output none || echo "Role assignment for ${mg_scope} already exists or failed — non-blocking"
        done
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
