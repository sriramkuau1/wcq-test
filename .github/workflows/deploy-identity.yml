name: Deploy Identity Subscription

on:
  workflow_dispatch:
    inputs:
      deploy:
        type: boolean
        description: Terraform Apply

jobs:
  tf_fmt:
    name: Deploy Identity
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Repo
      uses: actions/checkout@v6
      
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Concat Vars
      run: cat env/terraform.global.tfvars env/terraform.identity.tfvars > temp.tfvars && cat temp.tfvars > terraform.identity.tfvars

    - name: Inject Firewall private IP into UDR
      run: |
        az login --service-principal -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" --output none
        FW_IP=$(az network firewall list \
          --resource-group rg-syd-plat-conn-connectivity \
          --subscription "$ARM_SUBSCRIPTION_ID" \
          --query "[0].hubIPAddresses.privateIPAddress" -o tsv)
        if [ -z "$FW_IP" ]; then
          echo "::warning::Firewall private IP not found — UDR next_hop will be empty"
        else
          sed -i "s|next_hop_in_ip_address = \"0.0.0.0\".*# Placeholder|next_hop_in_ip_address = \"$FW_IP\" # Auto-injected from Azure Firewall|" terraform.identity.tfvars
          echo "Injected Firewall private IP: $FW_IP"
        fi
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform init
      id: init
      run: terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.IDAM_SUB_ID }}
    
    - name: Terraform validate
      id: validate
      run: terraform validate
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.IDAM_SUB_ID }}
    
    - name: Terraform workspace
      id: workspace
      run: terraform workspace select identity
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.IDAM_SUB_ID }}
 
    - name: Terraform plan
      id: plan
      run: terraform plan -var-file="terraform.identity.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.IDAM_SUB_ID }}
 
    - name: Terraform apply
      if: ${{ inputs.deploy }}
      id: apply
      run: terraform apply -auto-approve -var-file="terraform.identity.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.IDAM_SUB_ID }}
