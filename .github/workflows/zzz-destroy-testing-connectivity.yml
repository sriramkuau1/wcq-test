name: zzz - TEST ONLY - Destroy Connectivity (Do Not Use in Production)

on:
  workflow_dispatch:
    inputs:
      confirm_phrase:
        type: string
        description: TESTING ONLY - Type DESTROY-TESTING to continue. Do not use in production.
        required: true
      destroy:
        type: boolean
        description: Execute terraform destroy apply

permissions:
  contents: read

jobs:
  terraform_destroy:
    name: Test Destroy Connectivity
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:

    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Concat Vars
      run: cat env/terraform.global.tfvars env/terraform.connectivity.tfvars > terraform.connectivity.tfvars

    - name: Strip resource consolidation overrides for full destroy
      run: |
        # Remove existing_resource_group_name so management module owns its RG
        sed -i '/existing_resource_group_name.*=.*rg-syd-plat-conn-connectivity/d' terraform.connectivity.tfvars
        # Remove Key Vault resource_group_name override so it targets the original identity RG
        sed -i '/resource_group_name.*=.*rg-syd-plat-conn-connectivity/d' terraform.connectivity.tfvars
        # Revert Key Vault name to match what is in state (-03, not -04)
        sed -i 's/akv-org-syd-plat-idam-04/akv-org-syd-plat-idam-03/' terraform.connectivity.tfvars
        # Revert management module to use local.enabled so it owns the RG for destroy
        sed -i 's/= local\.deploy_resource_group$/= local.enabled/' modules/management/locals.tf
        echo "--- Overrides stripped for destroy ---"
        grep -n 'existing_resource_group_name\|resource_group_name.*rg-syd\|idam-04' terraform.connectivity.tfvars || echo "Confirmed: no consolidation overrides remain"
        grep 'deploy_management_resource_group' modules/management/locals.tf

    - name: Terraform init
      id: init
      run: terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform validate
      id: validate
      run: terraform validate
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform workspace
      id: workspace
      run: terraform workspace select connectivity
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform plan destroy
      id: plan_destroy
      run: terraform plan -destroy -var-file="terraform.connectivity.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Safety check for destroy
      if: ${{ inputs.destroy }}
      run: |
        if [ "${{ inputs.confirm_phrase }}" != "DESTROY-TESTING" ]; then
          echo "Refusing destroy. This workflow is for testing only and must not be used in production."
          exit 1
        fi

    - name: Terraform destroy
      if: ${{ inputs.destroy && inputs.confirm_phrase == 'DESTROY-TESTING' }}
      id: destroy
      run: terraform apply -destroy -auto-approve -var-file="terraform.connectivity.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}
