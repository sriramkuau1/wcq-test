name: zzz - TEST ONLY - Destroy Archetypes (Do Not Use in Production)

on:
  workflow_dispatch:
    inputs:
      confirm_phrase:
        type: string
        description: TESTING ONLY - Type DESTROY-TESTING to continue. Do not use in production.
        required: true
      destroy:
        type: boolean
        description: Execute terraform destroy apply

permissions:
  contents: read

jobs:
  terraform_destroy:
    name: Test Destroy Archetypes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:

    - name: Checkout Repo
      uses: actions/checkout@v7

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Concat Vars
      run: cat env/terraform.global.tfvars env/terraform.archetypes.tfvars > terraform.archetypes.tfvars

    - name: Terraform init
      id: init
      run: terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform validate
      id: validate
      run: terraform validate
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform workspace
      id: workspace
      run: terraform workspace select archetypes
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Terraform plan destroy
      id: plan_destroy
      run: terraform plan -destroy -parallelism=5 -var-file="terraform.archetypes.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}

    - name: Safety check for destroy
      if: ${{ inputs.destroy }}
      run: |
        if [ "${{ inputs.confirm_phrase }}" != "DESTROY-TESTING" ]; then
          echo "Refusing destroy. This workflow is for testing only and must not be used in production."
          exit 1
        fi

    - name: Terraform destroy
      if: ${{ inputs.destroy && inputs.confirm_phrase == 'DESTROY-TESTING' }}
      id: destroy
      run: terraform apply -destroy -auto-approve -parallelism=5 -var-file="terraform.archetypes.tfvars"
      env:
        ARM_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        ARM_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        ARM_TENANT_ID:  ${{ secrets.TENANT_ID }}
        ARM_SUBSCRIPTION_ID:  ${{ secrets.CONN_SUB_ID }}
